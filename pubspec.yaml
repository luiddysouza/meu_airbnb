name: meu_airbnb
description: "Aplicativo Flutter (web + mobile) para gerenciamento de hospedagens de Airbnb. Portfólio com Clean Architecture, Server-Driven UI, Cubit/MobX e Design System próprio."
publish_to: 'none'

version: 1.0.0+1

environment:
  sdk: ^3.11.4

dependencies:
  flutter:
    sdk: flutter

  # UI / Roteamento
  cupertino_icons: ^1.0.8
  go_router: ^14.0.0

  # Gerenciamento de estado
  flutter_bloc: ^9.0.0        # Cubit para SDUI engine
  mobx: ^2.4.0                # Estado reativo do domínio
  flutter_mobx: ^2.2.0        # Observer widgets

  # Injeção de dependências
  get_it: ^8.0.0

  # Utilitários de domínio
  equatable: ^2.0.5           # Comparação de entidades por valor
  uuid: ^4.5.0                # Geração de IDs únicos
  fpdart: ^1.1.0              # Either<Falha, T>

  # Serialização JSON
  json_annotation: ^4.9.0

  # Design System (package local)
  design_system:
    path: packages/design_system
  widgetbook: ^3.22.0

dev_dependencies:
  flutter_test:
    sdk: flutter

  flutter_lints: ^6.0.0

  # Code generation
  mobx_codegen: ^2.7.0        # Geração .g.dart para MobX
  json_serializable: ^6.9.0   # fromJson / toJson
  build_runner: ^2.4.0        # Runner de code generation

  # Testes
  mockito: ^5.4.4             # Mocks para testes
  bloc_test: ^10.0.0          # Testes de Cubit

flutter:
  uses-material-design: true

  assets:
    - assets/mock/
  # assets:
  #   - images/a_dot_burr.jpeg
  #   - images/a_dot_ham.jpeg

  # An image asset can refer to one or more resolution-specific "variants", see
  # https://flutter.dev/to/resolution-aware-images

  # For details regarding adding assets from package dependencies, see
  # https://flutter.dev/to/asset-from-package

  # To add custom fonts to your application, add a fonts section here,
  # in this "flutter" section. Each entry in this list should have a
  # "family" key with the font family name, and a "fonts" key with a
  # list giving the asset and other descriptors for the font. For
  # example:
  # fonts:
  #   - family: Schyler
  #     fonts:
  #       - asset: fonts/Schyler-Regular.ttf
  #       - asset: fonts/Schyler-Italic.ttf
  #         style: italic
  #   - family: Trajan Pro
  #     fonts:
  #       - asset: fonts/TrajanPro.ttf
  #       - asset: fonts/TrajanPro_Bold.ttf
  #         weight: 700
  #
  # For details regarding fonts from package dependencies,
  # see https://flutter.dev/to/font-from-package
